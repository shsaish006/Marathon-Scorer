apiVersion: apps/v1
kind: Deployment
metadata:
  name: marathon-app-deployment
  labels:
    app: marathon-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marathon-app
  template:
    metadata:
      labels:
        app: marathon-app
    spec:
      containers:
        - name: app
          image: marathon-scorer-runner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: marathon-configmap
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: marathon-configmap
                  key: NODE_ENV
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: marathon-configmap
                  key: DB_USER
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: marathon-configmap
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: marathon-configmap
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marathon-db-secret
                  key: postgres-password
          livenessProbe:
            httpGet:
              path: /api/challenges
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/challenges
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: marathon-app-service
spec:
  ports:
    - port: 80
      targetPort: 5000
  selector:
    app: marathon-app
  type: LoadBalancer
